# Local dev: only the database runs in Docker.
# Run the app directly: npm run dev
# For production Docker build, use the Dockerfile directly.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sysml_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
